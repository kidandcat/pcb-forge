# PCB Forge - Manual Placement Example
# Demonstrates manual component positioning with x, y, and rotation fields.

[board]
width = 40.0
height = 30.0
layers = 2
trace_width = 0.25

# ──────────────────────────────────────
# Components with manual positions
# ──────────────────────────────────────

[components.mcu]
footprint = "Package_SO.pretty/SOIC-8_3.9x4.9mm_P1.27mm.kicad_mod"
value = "ATtiny85"
x = 20.0
y = 15.0

[components.mcu.pins]
VCC = 8
GND = 4
PB0 = 5
PB1 = 6

[components.r1]
footprint = "Resistor_SMD.pretty/R_0402_1005Metric.kicad_mod"
value = "10K"
x = 10.0
y = 10.0
rotation = 90.0

[components.r1.pins]
P1 = 1
P2 = 2

[components.c1]
footprint = "Capacitor_SMD.pretty/C_0402_1005Metric.kicad_mod"
value = "100nF"
x = 25.0
y = 10.0

[components.c1.pins]
P1 = 1
P2 = 2

[components.led]
footprint = "LED_SMD.pretty/LED_0603_1608Metric.kicad_mod"
value = "Green LED"
x = 10.0
y = 20.0
rotation = 180.0

[components.led.pins]
ANODE = 1
CATHODE = 2

# ──────────────────────────────────────
# Nets
# ──────────────────────────────────────

[[nets]]
name = "SIG"
pins = ["mcu.PB0", "r1.P1"]

[[nets]]
name = "LED_DRIVE"
pins = ["mcu.PB1", "led.ANODE"]

# ──────────────────────────────────────
# Power
# ──────────────────────────────────────

[power]
vcc = ["mcu.VCC", "c1.P1", "r1.P2"]
gnd = ["mcu.GND", "c1.P2", "led.CATHODE"]
